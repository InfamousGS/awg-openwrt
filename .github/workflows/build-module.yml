name: Create Release on Tag (ImmortalWrt Version)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'ImmortalWrt version (ex: 24.10.5)'
        required: true
        default: '24.10.5'
        type: string
      targets:
        description: 'Targets'
        required: false
        default: 'mediatek'
        type: string
      subtargets:
        description: 'Subtargets'
        required: false
        default: 'filogic'
        type: string

env:
  # Força o uso do Node 24 para evitar avisos de obsolescência
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # ATUALIZADO PARA NODE 24

      - name: Get Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
            echo "TARGETS=mediatek" >> $GITHUB_ENV
            echo "SUBTARGETS=filogic" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm install

      - name: Generate Job Config
        id: generate-config
        run: node index.js ${{ env.VERSION }} "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: "ImmortalWrt ${{ matrix.build_env.tag }} - ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false

    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools

      - name: Download and extract ImmortalWrt SDK
        run: |
          BASE_URL="https://downloads.immortalwrt.org/releases/${{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}/"
          SDK_FILE=$(curl -s "$BASE_URL" | grep -o "immortalwrt-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "SDK do ImmortalWrt não encontrado!"
            exit 1
          fi
          
          echo "Baixando SDK: ${BASE_URL}${SDK_FILE}"
          wget "${BASE_URL}${SDK_FILE}"
          tar -xf "$SDK_FILE"
          rm "$SDK_FILE"

      - name: Setup SDK and feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "*sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          cp -r ../kmod-amneziawg package/
          cp -r ../amneziawg-tools package/
          cp -r ../luci-proto-amneziawg package/
          
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          make defconfig

      - name: Build AmneziaWG
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "*sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          make package/kmod-amneziawg/compile V=s
          make package/amneziawg-tools/compile V=s
          make package/luci-proto-amneziawg/compile V=s

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "*sdk-*" -type d | head -n1)
          mkdir -p awgrelease
          
          # FILTRO CRÍTICO: Pega apenas o que tem "amneziawg" no nome
          find "$SDK_DIR/bin/" -name "*amneziawg*.ipk" -exec cp {} awgrelease/ \;
          
          echo "Arquivos filtrados para o Release:"
          ls -la awgrelease/

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: awgrelease/*.ipk
          tag_name: v${{ matrix.build_env.tag }}-immortal
          generate_release_notes: true
