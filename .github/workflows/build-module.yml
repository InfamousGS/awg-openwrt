name: Create Release on Tag (ImmortalWrt Version)

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do ImmortalWrt'
        required: true
        default: '24.10.6'
      targets:
        description: 'Targets'
        default: 'mediatek'
      subtargets:
        description: 'Subtargets'
        default: 'filogic'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools build-essential clang flex bison gawk gettext git ccache texinfo libssl-dev xz-utils ncurses-dev

      - name: Build
        run: |
          # Define a versão do SDK
          VERSION="${{ inputs.version }}"
          TARGET="${{ inputs.targets }}"
          SUBTARGET="${{ inputs.subtargets }}"
          
          # Baixa e extrai
          BASE_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/${TARGET}/${SUBTARGET}/"
          SDK_FILE=$(curl -s "$BASE_URL" | grep -o "immortalwrt-sdk-${VERSION}-${TARGET}-${SUBTARGET}_gcc-[^\"]*_musl[^\"]*\.Linux-x86_64\.tar\.[xz|zst]*" | head -n1)
          wget "${BASE_URL}${SDK_FILE}"
          tar -xf "$SDK_FILE"
          SDK_DIR=$(find . -maxdepth 1 -name "*sdk-*" -type d | head -n1)
          
          cd "$SDK_DIR"
          
          # Prepara feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Copia seus pacotes
          cp -r ../kmod-amneziawg package/
          cp -r ../amneziawg-tools package/
          cp -r ../luci-proto-amneziawg package/
          
          # CRUCIAL: Configuração silenciosa sem menuconfig
          # Cria um arquivo .config básico para evitar erro de terminal
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" >> .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          
          # Resolve dependências faltando
          make defconfig
          
          # Compila sem interatividade
          make package/kmod-amneziawg/compile
          make package/amneziawg-tools/compile
          make package/luci-proto-amneziawg/compile

      - name: Release
        run: |
          mkdir -p awgrelease
          find . -name "*.ipk" -exec cp {} awgrelease/ \;
          ls -la awgrelease/
          
        # Usamos o upload direto para evitar problemas com tokens de release
      - uses: softprops/action-gh-release@v2
        with:
          files: awgrelease/*.ipk
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
